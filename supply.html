<style>
:root{
  --bg:#0a0e17; --panel:#111726; --panel2:#0d1320; --line:#1e2940;
  --txt:#e6edf6; --dim:#8a96ab; --dim2:#5d6880;
  --up:#2ec27e; --down:#e5484d; --accent:#3b82f6; --kospi:#3b82f6; --kosdaq:#c026d3; --warn:#f5a524;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:"Pretendard Variable",Pretendard,
  "Malgun Gothic","맑은 고딕","Segoe UI",-apple-system,sans-serif;font-size:11.5px;padding:12px 14px 28px}
.title{font-size:17px;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.logo{width:22px;height:22px;border-radius:6px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:inline-flex;align-items:center;justify-content:center;font-size:13px}
.sub{color:var(--dim);font-size:12px;margin:7px 0 2px}
.sub b{color:#cdd7e6;font-weight:600}
.legend{color:var(--dim2);font-size:11px;margin-top:3px;display:flex;gap:14px;flex-wrap:wrap}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.k{background:var(--kospi)} .dot.q{background:var(--kosdaq)}

.tabs{display:flex;gap:6px;margin:16px 0 4px;border-bottom:1px solid var(--line)}
.tab{padding:9px 16px;border:none;background:transparent;color:var(--dim);font-size:13px;
  font-weight:700;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;font-family:inherit}
.tab:hover{color:var(--txt)}
.tab.on{color:#fff;border-bottom-color:var(--accent)}

.toolbar{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin:14px 0 12px}
.group{display:flex;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:3px}
.btn{padding:6px 12px;border:none;background:transparent;color:var(--dim);font-size:11.5px;
  font-weight:600;border-radius:6px;cursor:pointer;transition:.12s;white-space:nowrap;font-family:inherit}
.btn:hover{color:var(--txt)}
.btn.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.35)}
.btn.sell.on{background:var(--down);box-shadow:0 2px 8px rgba(229,72,77,.35)}
.spacer{flex:1}
.glabel{color:var(--dim2);font-size:10.5px;align-self:center;margin-right:2px}

.grid{display:grid;gap:9px}
.g5{grid-template-columns:repeat(auto-fit,minmax(278px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(286px,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g2{grid-template-columns:repeat(auto-fit,minmax(520px,1fr))}
@media(max-width:1120px){.g3{grid-template-columns:1fr}}
@media(max-width:760px){.grid{grid-template-columns:1fr!important}}
.card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:11px;overflow:hidden}
.card h3{font-size:11.5px;font-weight:700;padding:9px 11px;display:flex;justify-content:space-between;
  align-items:center;gap:6px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.015);white-space:nowrap}
.card h3 .badge{flex:none}
.badge{font-size:10px;font-weight:700;color:#9fb4d8;background:rgba(59,130,246,.13);
  border:1px solid rgba(59,130,246,.25);padding:2px 7px;border-radius:5px}
.badge.sell{color:#f0a3a5;background:rgba(229,72,77,.13);border-color:rgba(229,72,77,.3)}
.badge.comm{color:#c9b3ee;background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.3)}
table{width:100%;border-collapse:collapse;table-layout:fixed;font-variant-numeric:tabular-nums}
th{font-size:10px;color:var(--dim2);font-weight:600;text-align:right;padding:5px 6px;border-bottom:1px solid var(--line);white-space:nowrap}
th.c1{text-align:center;width:24px} th.c2{text-align:left;width:auto} th.cn{text-align:center;width:26px}
td{padding:4.5px 6px;border-bottom:1px solid rgba(30,41,64,.5);text-align:right;font-size:11px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.025)}
.rk{text-align:center;color:var(--dim2);font-size:10.5px}
.rk.top{color:#f5c451;font-weight:700}
.nm{text-align:left;font-weight:600;color:#dde6f2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slnk{color:inherit;text-decoration:none;cursor:pointer}
.slnk:hover{color:#fff;text-decoration:underline}
.commchip{cursor:pointer;text-decoration:none}
.nm .code{color:var(--dim2);font-size:9.5px;font-weight:400;margin-left:4px}
.net{color:#b9c4d6;font-weight:600}.rat{font-weight:700}.gc{text-align:center}
.up{color:var(--up)}.down{color:var(--down)}
.card.hl{border-color:rgba(139,92,246,.5);box-shadow:0 0 0 1px rgba(139,92,246,.22) inset;margin-bottom:13px}
.commrow{display:flex;flex-wrap:wrap;gap:7px;padding:11px}
.commchip{background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.32);border-radius:7px;
  padding:5px 11px;font-weight:700;color:#e9e2ff;font-size:12px}
.commchip b{font-weight:700;margin-left:5px}
.empty{padding:24px 10px;text-align:center;color:var(--dim2);font-size:11.5px}
.foot{margin-top:24px;text-align:center;color:var(--dim2);font-size:11px}
.hidden{display:none}
</style>

function tableHead(cols){return '<table><thead><tr>'+cols+'</tr></thead><tbody>';}

// 섹션1/2 공용 순매수·순매도 행 (종목/순매수/비율/GC)
function rowsNV(rows){
  if(!rows.length) return '<div class="empty">데이터 없음</div>';
  return tableHead('<th class="c1">#</th><th class="c2">종목</th><th style="width:48px">등락률</th><th style="width:56px">순매수</th><th style="width:74px">순매수/시총</th><th class="cn">GC</th>')
    + rows.map((r,i)=>'<tr><td class="'+(i<3?"rk top":"rk")+'">'+(i+1)+'</td>'
      +'<td class="nm">'+nmLink(r)+'</td>'
      +'<td class="rat" style="color:'+ratCls(r.ch)+'">'+fmtPct(r.ch)+'</td>'
      +'<td class="net">'+fmtNet(r.v)+'</td>'
      +'<td class="rat" style="color:'+ratCls(r.r)+'">'+fmtRat(r.r)+'</td>'
      +'<td class="gc">'+gcDot(r)+'</td></tr>').join('')+'</tbody></table>';
}

// 기관 3주체 표 (RANK·종목명·등락률·순매수/시총·금액·시총)
function rowsInst(rows){
  if(!rows.length) return '<div class="empty">데이터 없음</div>';
  return '<table><thead><tr><th class="c1">#</th><th class="c2">종목명</th>'
    +'<th style="width:48px">등락률</th><th style="width:74px">순매수/시총</th>'
    +'<th style="width:56px">금액</th><th style="width:60px">시총(억)</th></tr></thead><tbody>'
    +rows.map((r,i)=>'<tr><td class="'+(i<3?"rk top":"rk")+'">'+(i+1)+'</td>'
      +'<td class="nm">'+nmLink(r)+'</td>'
      +'<td class="rat" style="color:'+ratCls(r.ch)+'">'+r.ch.toFixed(2)+'%</td>'
      +'<td class="rat" style="color:'+ratCls(r.r)+'">'+r.r.toFixed(2)+'%</td>'
      +'<td class="net">'+Math.round(r.v).toLocaleString("ko-KR")+'억</td>'
      +'<td class="net">'+fmtNum(r.mc)+'</td></tr>').join('')+'</tbody></table>';
}

  if(!rows.length) body='<div class="empty">공통 종목 없음</div>';
  else body=tableHead('<th class="c1">#</th><th class="c2">종목</th><th style="width:64px">사모</th><th style="width:64px">연금</th><th style="width:64px">투신</th>')
    +rows.map((r,i)=>'<tr><td class="'+(i<3?"rk top":"rk")+'">'+(i+1)+'</td>'
      +'<td class="nm">'+nmLink(r)+'</td>'
      +'<td style="color:'+ratCls(r.a)+';font-weight:700">'+fmtRat(r.a)+'</td>'
      +'<td style="color:'+ratCls(r.b)+';font-weight:700">'+fmtRat(r.b)+'</td>'
      +'<td style="color:'+ratCls(r.t)+';font-weight:700">'+fmtRat(r.t)+'</td></tr>').join('')+'</tbody></table>';
  const card=document.createElement("div"); card.className="card"; card.style.gridColumn="1/-1";
  card.innerHTML='<h3>3주체 공통 '+s2.side+' <span class="badge comm">'+s2.per+'거래일</span></h3>'+body;
  grid.appendChild(card);
}

/* ===== 컨트롤 ===== */
function mkBtns(id,items,getCur,setCur,cls){
  const g=document.getElementById(id); g.innerHTML="";
  items.forEach(it=>{
    const b=document.createElement("button");
    b.className="btn"+(cls?" "+cls:"")+(getCur()===it?" on":"");
    b.textContent=it;
    b.onclick=()=>{setCur(it);
      [...g.children].forEach(x=>x.classList.toggle("on",x.textContent===it));
      renderTab();};
    g.appendChild(b);
  });
}
const TABDEF=[["sec4","60일 신고가"],["sec3","거래량 급증"],["sec2","기관 수급 (사모, 연금, 투신)"],
              ["sec5","당일 투자자별 순매수 랭킹"],["sec1","누적 투자자별 순매수 랭킹"]];
const SECS=TABDEF.map(d=>d[0]);
function buildTabs(){
  const t=document.getElementById("tabs"); t.innerHTML="";
  TABDEF.forEach(([id,label])=>{
    const b=document.createElement("button");
    b.className="tab"+(TAB===id?" on":""); b.textContent=label;
    b.onclick=()=>{TAB=id;
      [...t.children].forEach((x,i)=>x.classList.toggle("on",SECS[i]===id));
      SECS.forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==id));
      renderTab();};
    t.appendChild(b);
  });
}
function renderTab(){ if(TAB==="sec1")render1(); else if(TAB==="sec2")render2(); else if(TAB==="sec3")render3(); else if(TAB==="sec5")render5(); else render4(); }

buildTabs();
mkBtns("g1Inv",D.investors,()=>s1.inv,v=>s1.inv=v);
mkBtns("g1Mkt",D.markets,()=>s1.mkt,v=>s1.mkt=v);
mkBtns("g1Sort",["비율","금액"],()=>s1.sort,v=>s1.sort=v);
mkBtns("g2Per",D.periods.map(String),()=>s2.per,v=>s2.per=v);
mkBtns("g2Side",["순매수","순매도"],()=>s2.side,v=>s2.side=v,null);
// 순매도 버튼 빨강 처리
[...document.getElementById("g2Side").children].forEach(b=>{if(b.textContent==="순매도")b.classList.add("sell");});
mkBtns("g5Mkt",["코스피","코스닥","전체"],()=>s5.mkt,v=>s5.mkt=v);
mkBtns("g5Sort",["비율","금액"],()=>s5.sort,v=>s5.sort=v);
// 초기 탭 표시
SECS.forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==TAB));
renderTab();
</script>
