const MK = {KR:'한국', US:'미국'};

function monthPreview(mo){
  const cnt = {};
  mo.weeks.forEach(w=>w.sectors.forEach((s,i)=>{ cnt[s.theme]=(cnt[s.theme]||0)+(5-i); }));
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(x=>x[0]).join(' · ');
}
function weekHtml(w){
  if(!w.sectors.length) return '<div class="wk"><div class="wh">'+w.wlabel+'<span class="rg">'+w.range+'</span></div><div class="none">주도주 없음</div></div>';
  let s='<div class="wk"><div class="wh">'+w.wlabel+'<span class="rg">'+w.range+'</span></div>';
  w.sectors.forEach(sec=>{
    let names = sec.stocks.map(st=>st.n+'<span class="pc"> +'+st.wret+'%</span>'+(st.nh?'<span class="nh">·</span>':'')).join('<span style="color:var(--dim2)"> , </span>');
    s+='<div class="sec"><span class="th">'+sec.theme+'</span><span class="st">'+names+'</span></div>';
  });
  return s+'</div>';
}
function render(mkt){
  const months = DATA.markets[mkt].months.slice().reverse();  // 최신월 먼저
  let h='';
  months.forEach((mo,i)=>{
    h+='<details class="mon"'+(i===0?' open':'')+'><summary><span class="chev">&#9656;</span>'
      +'<span class="mo">'+mo.label+'</span><span class="pv">'+monthPreview(mo)+'</span></summary>'
      +'<div class="mbody">'+mo.weeks.map(weekHtml).join('')+'</div></details>';
  });
  document.getElementById('view').innerHTML=h;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===mkt));
}
const tabs=document.getElementById('tabs');
Object.keys(DATA.markets).forEach((mkt,i)=>{
  const b=document.createElement('div');b.className='tab'+(i===0?' on':'');b.dataset.m=mkt;b.textContent=MK[mkt]||mkt;b.onclick=()=>render(mkt);tabs.appendChild(b);
});
render(Object.keys(DATA.markets)[0]);
