const PC = {shock:'--p-shock',small:'--p-small',large:'--p-large',semi:'--p-semi',mix:'--p-mix'};
const PL = {shock:'공포·조정',small:'코스닥·중소형 반등',large:'코스피 대형 확산',semi:'반도체·대형 주도',mix:'혼조·전환'};

/* 현재 국면 콜아웃 */
(function(){
  const c=D.current; if(!c) return;
  const col='var('+PC[c.phase]+')';
  const secs=c.sectors.map(s=>s.s).join(' · ');
  document.getElementById('nowbox').innerHTML='<div class="now" style="border-left-color:'+col+'">'
    +'<div class="lab">현재 국면 · '+c.mlabel+' ('+c.wlabel+')</div>'
    +'<div class="ph" style="color:'+col+'">'+c.phaseLabel+'</div>'
    +'<div class="det">코스피 '+c.kospi+'% · 코스닥 '+c.kosdaq+'% · 스프레드 '+(c.spread>0?'+':'')+c.spread+'%p · 주도 '+secs+'</div>'
    +'<div class="hint">▶ '+D.current_hint+'</div></div>';
})();

/* 누적 코스피 라인 */
(function(){
  const W=880,H=96,PT=8,PB=10; const ws=D.weeks;
  let cum=100; const cums=ws.map(w=>{cum*=(1+(w.kospi||0)/100);return cum;});
  const lo=Math.min(...cums),hi=Math.max(...cums);
  const x=i=>i/(ws.length-1)*W, y=v=>PT+(hi-v)/((hi-lo)||1)*(H-PT-PB);
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';
  ws.forEach((w,i)=>{ if(w.phase==='shock') s+='<rect x="'+(x(i)-2)+'" y="0" width="4" height="'+H+'" fill="rgba(198,95,82,.16)"/>'; });
  let pts=cums.map((v,i)=>x(i).toFixed(1)+','+y(v).toFixed(1)).join(' ');
  s+='<polyline points="'+pts+'" fill="none" stroke="var(--gold)" stroke-width="1.6"/>';
  s+='</svg>'; document.getElementById('cum').innerHTML=s;
})();

/* 국면 스프레드 막대 */
(function(){
  const W=880,H=118,ZY=59; const ws=D.weeks;
  const mx=Math.min(18,Math.max(...ws.map(w=>Math.abs(w.spread||0))))||10;
  const bw=W/ws.length;
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';
  s+='<line x1="0" x2="'+W+'" y1="'+ZY+'" y2="'+ZY+'" stroke="var(--line)" stroke-width="1"/>';
  ws.forEach((w,i)=>{
    const sp=Math.max(-mx,Math.min(mx,w.spread||0)); const h=Math.abs(sp)/mx*(ZY-6);
    const yy=sp>=0?ZY-h:ZY; const col='var('+PC[w.phase]+')';
    s+='<rect x="'+(i*bw+bw*0.12).toFixed(1)+'" y="'+yy.toFixed(1)+'" width="'+(bw*0.76).toFixed(1)+'" height="'+Math.max(1,h).toFixed(1)+'" fill="'+col+'"><title>'+w.mlabel+' '+w.wlabel+'  스프레드 '+w.spread+'%p  '+w.phaseLabel+'</title></rect>';
  });
  // 월 라벨
  let lastM='';
  ws.forEach((w,i)=>{ if(w.ym!==lastM && w.ym.slice(4)==='01' || (w.ym!==lastM && i%8===0)){ lastM=w.ym; s+='<text x="'+(i*bw+2)+'" y="'+(H-2)+'" fill="var(--dim2)" font-size="8">'+w.ym.slice(0,4)+'.'+w.ym.slice(4)+'</text>'; }});
  s+='</svg>'; document.getElementById('clock').innerHTML=s;
  document.getElementById('legend').innerHTML=Object.keys(PL).map(k=>'<span><b style="background:var('+PC[k]+')"></b>'+PL[k]+'</span>').join('');
})();

/* 주간 표 (최신 먼저, 월 헤더) */
(function(){
  let h='',lastM='';
  D.weeks.slice().reverse().forEach(w=>{
    if(w.mlabel!==lastM){ lastM=w.mlabel; h+='<tr class="mrow"><td class="l" colspan="6">'+w.mlabel+'</td></tr>'; }
    const kc=w.kospi>=0?'pos':'neg', qc=w.kosdaq>=0?'pos':'neg', sc=w.spread>=0?'pos':'neg';
    const col='var('+PC[w.phase]+')';
    const secs=w.sectors.map(x=>x.s+' <span style="color:var(--dim2)">'+(x.rs>=0?'+':'')+x.rs+'</span>').join(' · ')||'-';
    h+='<tr><td class="l">'+w.wlabel+(w.ndays<4?' <span style="color:var(--dim2)">(부분)</span>':'')+'</td>'
      +'<td class="'+kc+'">'+(w.kospi>=0?'+':'')+w.kospi+'</td>'
      +'<td class="'+qc+'">'+(w.kosdaq>=0?'+':'')+w.kosdaq+'</td>'
      +'<td class="'+sc+'">'+(w.spread>=0?'+':'')+w.spread+'</td>'
      +'<td class="l"><span class="pchip" style="background:'+col+'">'+w.phaseLabel+'</span></td>'
      +'<td class="l secs">'+secs+'</td></tr>';
  });
  document.getElementById('wtable').innerHTML=h;
})();

/* 월별 대장주 + 주봉 (토글) */
function ymIdx(ym){return (+ym.slice(0,4))*12+(+ym.slice(4,6));}
function candlesFor(code,repYm){const rec=D.candles[code];if(!rec)return null;const ri=ymIdx(repYm);return rec.candles.filter(k=>{const i=ymIdx(k.ym);return i>=ri-4&&i<=ri+2;});}
function drawC(cs,repYm){if(!cs||cs.length<2)return'';const W=660,H=104,PT=8,PB=8;const lo=Math.min(...cs.map(c=>c.l)),hi=Math.max(...cs.map(c=>c.h));const y=v=>PT+(hi-v)/((hi-lo)||1)*(H-PT-PB);const cw=W/cs.length,bw=Math.max(2,cw*0.6);let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none">';cs.forEach((c,i)=>{if(c.ym===repYm)s+='<rect x="'+(i*cw).toFixed(1)+'" y="0" width="'+cw.toFixed(1)+'" height="'+H+'" fill="var(--gold-soft)"/>';});cs.forEach((c,i)=>{const cx=i*cw+cw/2,up=c.c>=c.o,col=up?'var(--up)':'var(--dn)';s+='<line x1="'+cx.toFixed(1)+'" x2="'+cx.toFixed(1)+'" y1="'+y(c.h).toFixed(1)+'" y2="'+y(c.l).toFixed(1)+'" stroke="'+col+'" stroke-width="1"/>';const yo=y(c.o),yc=y(c.c);s+='<rect x="'+(cx-bw/2).toFixed(1)+'" y="'+Math.min(yo,yc).toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+Math.max(1.4,Math.abs(yo-yc)).toFixed(1)+'" fill="'+col+'"/>';});return s+'</svg>';}
function renderReps(){
  return D.months.slice().reverse().map(mo=>{
    const reps=(mo.reps||[]).map(r=>{
      const cs=candlesFor(r.code,mo.ym); const rc=r.monthret>=0?'up':'dn';
      const rv=r.monthret==null?'':(r.monthret>=0?'+':'')+r.monthret+'%';
      const capj=r.cap?(r.cap>=100000?Math.round(r.cap/10000):(r.cap/10000).toFixed(1))+'조':'';
      return '<div class="rep"><div class="rhd"><span class="rn">'+r.name+'</span><span class="rt">'+r.theme+'</span>'
        +(capj?'<span class="rc">시총 '+capj+'</span>':'')+'<span class="rr '+rc+'">'+rv+'</span><span class="rw">'+r.nweeks+'주</span></div>'
        +'<div class="chart">'+drawC(cs,mo.ym)+'</div></div>';
    }).join('');
    return '<div class="mcard"><div class="mhd">'+mo.label+'</div>'+reps+'</div>';
  }).join('');
}
const rt=document.getElementById('repToggle');
rt.onclick=()=>{const box=document.getElementById('reps');if(box.style.display==='none'){if(!box.innerHTML)box.innerHTML=renderReps();box.style.display='block';rt.textContent='접기';}else{box.style.display='none';rt.textContent='펼치기';}};
</script></body></html>
