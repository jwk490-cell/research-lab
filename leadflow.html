const MK = {KR:'한국', US:'미국'};

/* ── US: 월별 토글 주차별 ── */
function monthPreview(mo){
  const cnt={}; mo.weeks.forEach(w=>w.sectors.forEach((s,i)=>{cnt[s.theme]=(cnt[s.theme]||0)+(5-i);}));
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,4).map(x=>x[0]).join(' · ');
}
function weekHtml(w){
  if(!w.sectors.length) return '<div class="wk"><div class="wh">'+w.wlabel+'<span class="rg">'+w.range+'</span></div><div class="none">주도주 없음</div></div>';
  let s='<div class="wk"><div class="wh">'+w.wlabel+'<span class="rg">'+w.range+'</span></div>';
  w.sectors.forEach(sec=>{
    let names=sec.stocks.map(st=>st.n+'<span class="pc"> +'+st.wret+'%</span>'+(st.nh?'<span class="nh">·</span>':'')).join('<span style="color:var(--dim2)"> , </span>');
    s+='<div class="sec"><span class="th">'+sec.theme+'</span><span class="st">'+names+'</span></div>';
  });
  return s+'</div>';
}
function renderUS(){
  const months=DATA.markets.US.months.slice().reverse();
  return months.map((mo,i)=>'<details class="mon"'+(i===0?' open':'')+'><summary><span class="chev">&#9656;</span>'
    +'<span class="mo">'+mo.label+'</span><span class="pv">'+monthPreview(mo)+'</span></summary>'
    +'<div class="mbody">'+mo.weeks.map(weekHtml).join('')+'</div></details>').join('');
}

/* ── KR: 월별 대표종목 + 주봉 캔들 ── */
function ymIdx(ym){return (+ym.slice(0,4))*12 + (+ym.slice(4,6));}
function candlesFor(code, repYm){
  const rec=CAND[code]; if(!rec) return null;
  const ri=ymIdx(repYm);
  return rec.candles.filter(k=>{const i=ymIdx(k.ym);return i>=ri-4 && i<=ri+2;});
}
function drawCandles(cs, repYm){
  if(!cs||cs.length<2) return '<div class="nochart">주봉 데이터 없음</div>';
  const W=660,H=120,PT=9,PB=9;
  const lo=Math.min(...cs.map(c=>c.l)), hi=Math.max(...cs.map(c=>c.h));
  const y=v=>PT+(hi-v)/((hi-lo)||1)*(H-PT-PB);
  const cw=W/cs.length, bw=Math.max(2.2,cw*0.62);
  let s='<svg viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" class="cndl">';
  cs.forEach((c,i)=>{
    const cx=i*cw+cw/2;
    if(c.ym===repYm) s+='<rect x="'+(i*cw).toFixed(1)+'" y="0" width="'+cw.toFixed(1)+'" height="'+H+'" fill="var(--gold-soft)"/>';
  });
  cs.forEach((c,i)=>{
    const cx=i*cw+cw/2, up=c.c>=c.o, col=up?'var(--up)':'var(--dn)';
    s+='<line x1="'+cx.toFixed(1)+'" x2="'+cx.toFixed(1)+'" y1="'+y(c.h).toFixed(1)+'" y2="'+y(c.l).toFixed(1)+'" stroke="'+col+'" stroke-width="1"/>';
    const yo=y(c.o), yc=y(c.c), top=Math.min(yo,yc).toFixed(1), bh=Math.max(1.6,Math.abs(yo-yc)).toFixed(1);
    s+='<rect x="'+(cx-bw/2).toFixed(1)+'" y="'+top+'" width="'+bw.toFixed(1)+'" height="'+bh+'" fill="'+col+'"/>';
  });
  return s+'</svg>';
}
function renderKR(){
  const months=DATA.markets.KR.months.slice().reverse();
  return months.map(mo=>{
    let reps=(mo.reps||[]).map(r=>{
      const cs=candlesFor(r.code, mo.ym);
      const rc=r.monthret>=0?'up':'dn';
      const rv=(r.monthret==null?'':(r.monthret>=0?'+':'')+r.monthret+'%');
      const span=cs&&cs.length?(cs[0].d.slice(4,6)*1+'/'+ (cs[0].d.slice(6,8)*1) +' ~ '+ (cs[cs.length-1].d.slice(4,6)*1)+'/'+(cs[cs.length-1].d.slice(6,8)*1)):'';
      return '<div class="rep"><div class="rhd"><span class="rn">'+r.name+'</span>'
        +'<span class="rt">'+r.theme+'</span><span class="rr '+rc+'">'+rv+'</span>'
        +'<span class="rw">'+r.nweeks+'주 주도</span></div>'
        +'<div class="chart">'+drawCandles(cs, mo.ym)+'</div>'
        +'<div class="cxlabel"><span>'+span+'</span><span>주봉</span></div></div>';
    }).join('');
    return '<div class="mcard"><div class="mhd">'+mo.label+'</div>'+(reps||'<div class="nochart">대표 없음</div>')+'</div>';
  }).join('');
}
function render(mkt){
  document.getElementById('view').innerHTML = (mkt==='KR')?renderKR():renderUS();
  document.getElementById('ctrl').style.display = (mkt==='KR')?'none':'flex';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===mkt));
}
const tabs=document.getElementById('tabs');
['KR','US'].forEach((mkt,i)=>{const b=document.createElement('div');b.className='tab'+(i===0?' on':'');b.dataset.m=mkt;b.textContent=MK[mkt];b.onclick=()=>render(mkt);tabs.appendChild(b);});
