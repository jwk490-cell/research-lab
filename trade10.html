.toggles{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px}
.tg{display:flex; background:var(--panel2); border:1px solid var(--line); border-radius:9px; overflow:hidden}
.tg button{background:none; border:0; color:var(--tx2); font:inherit; font-size:12.5px;

.tg button.on{background:var(--gold); color:#14110a; font-weight:700}
.chartbox{position:relative; height:340px}
table{width:100%; border-collapse:collapse; font-size:13px}
th{color:var(--tx2); font-weight:600; font-size:12px; text-align:right;

th:first-child{text-align:left}
td{padding:8px 10px; text-align:right; border-bottom:1px solid #212938;
  font-variant-numeric:tabular-nums; cursor:pointer}
td:first-child{text-align:left; font-weight:600}
tr:hover td{background:#1d2432}
tr.sel td{background:#242e40}
tr.total td{color:var(--gold); font-weight:700}
.bar{display:inline-block; height:8px; border-radius:4px; background:var(--gold); vertical-align:middle}
.foot{color:var(--tx2); font-size:11.5px; line-height:1.7; margin-top:18px}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:20px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}

const PT_LABEL = {D10:"1~10일", D20:"1~20일", FULL:"월 전체"};
const state = {imex:"E", ptype:"D10", dim:"item", ci:0, years:3};
let chart = null;

const fmtM = v => (v/1000).toLocaleString("ko-KR",{maximumFractionDigits:0});   // 천불→백만불
const fmtB = v => (v/1e6).toFixed(1);                                            // 천불→십억불
const ymLabel = ym => ym.slice(0,4)+"."+ym.slice(4);

function rowsOf(dim, imex, ptype){
  return DATA.series[dim+"_"+imex].filter(r => r.type===ptype);
}
function yoy(rows, i, ci){
  const cur = rows[i]; if(!cur) return null;
  const prevYm = String(Number(cur.ym)-100);
  const prev = rows.find(r => r.ym===prevYm);
  if(!prev || !prev.vals[ci] || cur.vals[ci]==null) return null;
  return (cur.vals[ci]/prev.vals[ci]-1)*100;
}
function latestRow(dim, imex){
  const all = DATA.series[dim+"_"+imex];
  return all[all.length-1];
}
function pct(v){
  if(v==null) return "<span style='color:var(--tx2)'>–</span>";
  const cls = v>=0 ? "pos" : "neg";
  return `<span class="${cls}">${v>=0?"+":""}${v.toFixed(1)}%</span>`;
}

/* ---------- 헤드라인 카드 ---------- */
function renderCards(){
  const e = latestRow("item","E"), i = latestRow("item","I");
  const eRows = rowsOf("item","E",e.type), iRows = rowsOf("item","I",i.type);
  const eYoy = yoy(eRows, eRows.findIndex(r=>r.ym===e.ym), 0);
  const iYoy = yoy(iRows, iRows.findIndex(r=>r.ym===i.ym), 0);
  const sameI = rowsOf("item","I",e.type).find(r=>r.ym===e.ym);
  const bal = sameI ? e.vals[0]-sameI.vals[0] : null;
  const cards = [
    {k:`수출 (${ymLabel(e.ym)} ${e.label})`, v:"$"+fmtB(e.vals[0])+"B", d:eYoy, dl:"전년동기"},
    {k:`수입 (${ymLabel(i.ym)} ${i.label})`, v:"$"+fmtB(i.vals[0])+"B", d:iYoy, dl:"전년동기"},
    {k:`무역수지 (${ymLabel(e.ym)} ${e.label})`,
     v:(bal==null?"–":(bal>=0?"+":"−")+"$"+fmtB(Math.abs(bal))+"B"), d:null},
    {k:"수출 반도체 ("+ymLabel(e.ym)+" "+e.label+")", v:"$"+fmtB(e.vals[1])+"B",
     d:yoy(eRows, eRows.findIndex(r=>r.ym===e.ym), 1), dl:"전년동기"},
  ];
  document.getElementById("cards").innerHTML = cards.map(c=>`
    <div class="card"><div class="k">${c.k}</div><div class="v">${c.v}</div>
    ${c.d!=null?`<div class="d">${pct(c.d)} <span style="color:var(--tx2);font-weight:400">${c.dl}</span></div>`:""}</div>`).join("");
}

/* ---------- 차트 ---------- */
function renderChart(){
  const rows = rowsOf(state.dim, state.imex, state.ptype);
  const n = state.years*12;
  const sub = rows.slice(-n);
  const labels = sub.map(r=>ymLabel(r.ym));
  const amts = sub.map(r=>r.vals[state.ci]!=null ? r.vals[state.ci]/1e6 : null);
  const yoys = sub.map(r=>{
    const idx = rows.indexOf(r);
    return yoy(rows, idx, state.ci);
  });
  const colName = DATA.cols[state.dim+"_"+state.imex][state.ci];
  document.getElementById("chartTitle").textContent =
    `${state.imex==="E"?"수출":"수입"} · ${colName} · ${PT_LABEL[state.ptype]} 누적 (막대: 십억달러, 선: YoY%)`;
  if(chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    data:{labels, datasets:[
      {type:"bar", label:"금액($B)", data:amts, backgroundColor:"rgba(201,162,74,.55)",
       borderColor:"#c9a24a", borderWidth:1, yAxisID:"y"},
      {type:"line", label:"YoY(%)", data:yoys, borderColor:"#e05f5f", backgroundColor:"#e05f5f",
       pointRadius:2.5, borderWidth:2, tension:.25, yAxisID:"y2", spanGaps:true},
    ]},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index", intersect:false},
      plugins:{legend:{labels:{color:"#9aa3b2", boxWidth:12, font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.yAxisID==="y2"
          ? ` YoY ${c.parsed.y==null?"–":c.parsed.y.toFixed(1)+"%"}`
          : ` $${c.parsed.y==null?"–":c.parsed.y.toFixed(2)}B`}}},
      scales:{
        x:{ticks:{color:"#9aa3b2", font:{size:10}, maxRotation:60}, grid:{color:"#212938"}},
        y:{ticks:{color:"#9aa3b2", font:{size:10}}, grid:{color:"#212938"},
           title:{display:true,text:"$B",color:"#9aa3b2",font:{size:10}}},
        y2:{position:"right", ticks:{color:"#e05f5f", font:{size:10}, callback:v=>v+"%"},
            grid:{drawOnChartArea:false}},
      }
    }
  });
}

/* ---------- 테이블 ---------- */
function renderTable(dim){
  const imex = state.imex;
  const key = dim+"_"+imex;
  const last = latestRow(dim, imex);
  const rows = rowsOf(dim, imex, last.type);
  const li = rows.findIndex(r=>r.ym===last.ym);
  const prevM = rows[li-1];
  document.getElementById(dim==="item"?"itemPeriod":"cntyPeriod").textContent =
    `${ymLabel(last.ym)} ${last.label} · ${imex==="E"?"수출":"수입"} · 백만달러`;
  const maxV = Math.max(...last.vals.slice(1).filter(v=>v!=null));
  const trs = DATA.cols[key].map((name,ci)=>{
    const v = last.vals[ci];
    const y = yoy(rows, li, ci);
    const pm = prevM ? yoy(rows, li-1, ci) : null;
    const w = ci===0?0:Math.round((v||0)/maxV*70);
    return `<tr class="${ci===0?"total":""} ${state.dim===dim&&state.ci===ci?"sel":""}"
      onclick="pick('${dim}',${ci})">
      <td>${name}</td>
      <td>${v==null?"–":fmtM(v)}</td>
      <td>${pct(y)}</td><td>${pct(pm)}</td>
      <td style="text-align:left">${ci===0?"":`<span class="bar" style="width:${w}px"></span>`}</td></tr>`;
  }).join("");
  document.getElementById(dim==="item"?"tblItem":"tblCnty").innerHTML =
    `<tr><th>${dim==="item"?"품목":"국가"}</th><th>금액</th><th>YoY</th><th>전월 YoY</th><th style="text-align:left">비중</th></tr>`+trs;
}

function pick(dim, ci){ state.dim=dim; state.ci=ci; renderAll(); }

  el.innerHTML = opts.map(([v,l])=>`<button class="${v===cur?"on":""}" data-v="${v}">${l}</button>`).join("");

}

    [["D10","1~10일"],["D20","1~20일"],["FULL","월 전체"]], state.ptype, v=>state.ptype=v);
  makeToggle(document.getElementById("tgYears"),
    [["3","3년"],["5","5년"],["10","전체"]], String(state.years), v=>state.years=Number(v));
}

function renderAll(){
  renderToggles(); renderCards(); renderChart(); renderTable("item"); renderTable("cnty");
}

const fn = DATA.footnote||{};
document.getElementById("subline").textContent =
  `갱신 ${DATA.updated} · 누적 기준(1~10일/1~20일/월 전체) · 전 기간 2016.01~ · 출처: 관세청 수출입무역통계(잠정치)`
  + (fn.workdays ? ` · ${fn.workdays}` : "");
document.getElementById("footer").innerHTML =
  "· 잠정치는 통관 기준 집계로 확정치와 차이가 있을 수 있습니다. 발표: 매월 11일(1~10일), 21일(1~20일), 익월 1일(월 전체).<br>"
  +"· 표의 행을 클릭하면 추이 차트가 해당 품목/국가로 전환됩니다. YoY는 전년 같은 달의 같은 누적 구간 대비입니다.";
renderAll();
</script>
