const MK={kr:'한국',us:'미국'};

const tabs=document.getElementById('tabs');
['kr','us'].forEach((m,i)=>{const b=document.createElement('div');b.className='tab'+(m===mkt?' on':'');b.dataset.m=m;b.textContent=MK[m];b.onclick=()=>{mkt=m;si=Math.min(si,D[mkt].length-1);render();};tabs.appendChild(b);});

const slider=document.getElementById('slider');
slider.oninput=()=>{si=+slider.value;render();};
document.getElementById('prev').onclick=()=>{if(si>0){si--;render();}};
document.getElementById('next').onclick=()=>{if(si<D[mkt].length-1){si++;render();}};
document.getElementById('latest').onclick=()=>{si=D[mkt].length-1;render();};

function fmt(v,signed){if(v==null)return'<span style="color:var(--dim2)">-</span>';const s=(signed&&v>0?'+':'')+v;return '<span class="'+(v>=0?'pos':'neg')+'">'+s+'</span>';}
function render(){
  const snaps=D[mkt]; if(si>snaps.length-1)si=snaps.length-1;
  const s=snaps[si], prev=si>0?snaps[si-1]:null;
  slider.max=snaps.length-1; slider.value=si;
  const dt=s.date;
  document.getElementById('when').innerHTML=s.ym.slice(0,4)+'.'+s.ym.slice(4)+'<small>'+dt.slice(0,4)+'-'+dt.slice(4,6)+'-'+dt.slice(6)+' 기준</small>';
  document.getElementById('ticks').innerHTML=snaps.map((x,i)=>i%3===0||i===snaps.length-1?'<span>'+x.ym.slice(2,4)+'.'+x.ym.slice(4)+'</span>':'').join('');
  const prevRank={};
  if(prev)prev.rows.forEach((r,i)=>prevRank[r.t]=i+1);
  let h='';
  s.rows.forEach((r,i)=>{
    const lead=r.navg!=null&&r.navg>=70;
    let dl='';
    if(prev){
      if(prevRank[r.t]==null)dl='<span class="d-new">NEW</span>';
      else{const df=prevRank[r.t]-(i+1);
        dl=df>0?'<span class="d-up">▲'+df+'</span>':df<0?'<span class="d-dn">▼'+(-df)+'</span>':'<span class="d-same">-</span>';}
    }
    h+='<tr class="'+(lead?'lead':'')+'"><td class="rk">'+(i+1)+'</td>'
      +'<td class="l nm" title="'+r.nm+'">'+r.nm+'</td>'
      +'<td class="navg" style="color:'+(lead?'var(--gold-hi)':'var(--txt)')+'">'+(r.navg==null?'-':r.navg)+'</td>'
      +'<td class="l"><span class="nbar"><i style="width:'+(r.navg||0)+'%"></i></span></td>'
      +'<td>'+fmt(r.r60,true)+'</td><td>'+fmt(r.r120,true)+'</td><td>'+fmt(r.r250,true)+'</td>'
      +'<td style="color:var(--dim)">'+(r.srk==null?'-':r.srk)+'</td>'
      +'<td>'+dl+'</td></tr>';
  });
  document.getElementById('tb').innerHTML=h;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.m===mkt));
}
render();
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'){if(si>0){si--;render();}}else if(e.key==='ArrowRight'){if(si<D[mkt].length-1){si++;render();}}});
