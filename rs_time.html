let mode='etf', mkt='kr', si=999;
const MK={kr:'한국',us:'미국'}, MD={etf:'ETF',stk:'개별종목'};
const SUB={etf:'섹터·테마 ETF 상대강도를 원하는 과거 시점(월말 스냅샷)으로 되감아 보기. RS = 벤치마크(KOSPI/SPY) 대비 상대수익, Norm 평균(navg) ≥ 70 = 주도.',
 stk:'개별종목 RS를 과거 시점으로 되감기. RS종합 = R60·R120·R250 가중(0.5/0.3/0.2) 백분위 — 상위 40 = 주도주 · RS20 ≥ 70 & RS종합 < 85 = 떠오르는 종목(선행 후보).'};

function snapsOf(){ return mode==='etf' ? RAW.etf[mkt] : RAW.stk[mkt]; }

const modetabs=document.getElementById('modetabs');
['etf','stk'].forEach(m=>{const b=document.createElement('div');b.className='tab'+(m===mode?' on':'');b.dataset.mode=m;b.textContent=MD[m];b.onclick=()=>{mode=m;render();};modetabs.appendChild(b);});
const tabs=document.getElementById('tabs');
['kr','us'].forEach(m=>{const b=document.createElement('div');b.className='tab'+(m===mkt?' on':'');b.dataset.m=m;b.textContent=MK[m];b.onclick=()=>{mkt=m;render();};tabs.appendChild(b);});

const slider=document.getElementById('slider');
slider.oninput=()=>{si=+slider.value;render();};
document.getElementById('prev').onclick=()=>{if(si>0){si--;render();}};
document.getElementById('next').onclick=()=>{if(si<snapsOf().length-1){si++;render();}};
document.getElementById('latest').onclick=()=>{si=snapsOf().length-1;render();};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'&&si>0){si--;render();}else if(e.key==='ArrowRight'&&si<snapsOf().length-1){si++;render();}});

function fmt(v,signed){if(v==null)return'<span style="color:var(--dim2)">-</span>';const s=(signed&&v>0?'+':'')+v;return '<span class="'+(v>=0?'pos':'neg')+'">'+s+'</span>';}
function capf(c){if(c==null)return'';return mkt==='kr'?(c>=100000?Math.round(c/10000)+'조':c>=10000?(c/10000).toFixed(1)+'조':Math.round(c/1000)/10+'천억'):('$'+(c>=100?Math.round(c):c)+'B');}
function v20f(v){return mkt==='kr'? Math.round(v)+'억' : '$'+Math.round(v)+'M';}

/* ETF 테이블 */
function renderETF(s,prev){
  const prevRank={}; if(prev)prev.rows.forEach((r,i)=>prevRank[r.t]=i+1);
  let h='<div class="card"><table><thead><tr><th></th><th class="l">ETF / 테마</th><th>navg</th><th></th><th>RS60</th><th>RS120</th><th>RS250</th><th>소티노</th><th>순위Δ</th></tr></thead><tbody>';
  s.rows.forEach((r,i)=>{
    const lead=r.navg!=null&&r.navg>=70;
    let dl='';
    if(prev){ if(prevRank[r.t]==null)dl='<span class="d-new">NEW</span>';
      else{const df=prevRank[r.t]-(i+1); dl=df>0?'<span class="d-up">▲'+df+'</span>':df<0?'<span class="d-dn">▼'+(-df)+'</span>':'<span class="d-same">-</span>';}}
    h+='<tr class="'+(lead?'lead':'')+'"><td class="rk">'+(i+1)+'</td><td class="l nm" title="'+r.nm+'">'+r.nm+'</td>'
      +'<td class="navg" style="color:'+(lead?'var(--gold-hi)':'var(--txt)')+'">'+(r.navg==null?'-':r.navg)+'</td>'
      +'<td class="l"><span class="nbar"><i style="width:'+(r.navg||0)+'%"></i></span></td>'
      +'<td>'+fmt(r.r60,true)+'</td><td>'+fmt(r.r120,true)+'</td><td>'+fmt(r.r250,true)+'</td>'
      +'<td style="color:var(--dim)">'+(r.srk==null?'-':r.srk)+'</td><td>'+dl+'</td></tr>';
  });
  h+='</tbody></table><div class="note">순위Δ = 직전 스냅샷 대비 · 과거 스냅샷도 현재 ETF 목록 기준(상장 60거래일 미만 제외)</div></div>';
  return h;
}

/* 개별종목 테이블 */
function stockRows(rows,prevRank,withScore){
  let h='';
  rows.forEach((r,i)=>{
    const lead=r.rsc>=90;
    let dl='';
    if(prevRank){ if(prevRank[r.c]==null)dl='<span class="d-new">NEW</span>';
      else{const df=prevRank[r.c]-(i+1); dl=df>0?'<span class="d-up">▲'+df+'</span>':df<0?'<span class="d-dn">▼'+(-df)+'</span>':'<span class="d-same">-</span>';}}
    const nm=mkt==='us'?r.c+'<small>'+(r.full||'')+'</small>':r.n;
    h+='<tr class="'+(lead?'lead':'')+'"><td class="rk">'+(i+1)+'</td>'
      +'<td class="l nm">'+nm+'<small>'+r.th+(r.cap?' · '+capf(r.cap):'')+'</small></td>'
      +'<td class="navg">'+r.rsc+'</td>'
      +'<td class="l"><span class="nbar"><i style="width:'+r.rsc+'%"></i></span></td>'
      +'<td>'+r.rs20+'</td>'
      +'<td><span class="'+(r.acc>=0?'accp':'accn')+'">'+(r.acc>=0?'+':'')+r.acc+'</span></td>'
      +'<td>'+fmt(r.r60,true)+'</td>'
      +'<td style="color:var(--dim)">'+v20f(r.v20)+'</td>'
      +(withScore?'<td style="color:var(--gold-hi);font-weight:700">'+r.score+'</td>':'')
      +'<td>'+dl+'</td></tr>';
  });
  return h;
}
function renderSTK(s,prev){
  const pl={}, pr={};
  if(prev){ prev.leaders.forEach((r,i)=>pl[r.c]=i+1); prev.risers.forEach((r,i)=>pr[r.c]=i+1); }
  let h='<div class="sect">주도주 TOP '+s.leaders.length+' — RS종합 순 <span style="color:var(--dim2);text-transform:none">(유니버스 '+s.n_uni+'종목)</span></div>';
  h+='<div class="card"><table><thead><tr><th></th><th class="l">종목</th><th>RS종합</th><th></th><th>RS20</th><th>가속</th><th>R60%</th><th>거래대금</th><th>순위Δ</th></tr></thead><tbody>';
  h+=stockRows(s.leaders,prev?pl:null,false);
  h+='</tbody></table></div>';
  h+='<div class="sect">떠오르는 종목 — RS20 ≥ 70 & RS종합 &lt; 85 (스코어 순)</div>';
  h+='<div class="card"><table><thead><tr><th></th><th class="l">종목</th><th>RS종합</th><th></th><th>RS20</th><th>가속</th><th>R60%</th><th>거래대금</th><th>스코어</th><th>순위Δ</th></tr></thead><tbody>';
  h+=stockRows(s.risers,prev?pr:null,true);
  h+='</tbody></table><div class="note">가속 = RS20 − RS종합 (단기 상대강도가 중기 대비 얼마나 빠른가, ＋ = 부상 중) · 거래대금 = 20일 평균 · 스냅샷 시점 데이터만 사용(미래정보 없음) · 유니버스는 현재 상장종목 기준</div></div>';
  return h;
}

function render(){
  const snaps=snapsOf();
  if(si>snaps.length-1)si=snaps.length-1;
  const s=snaps[si], prev=si>0?snaps[si-1]:null;
  slider.max=snaps.length-1; slider.value=si;
  document.getElementById('subline').innerHTML=SUB[mode];
  document.getElementById('meta').textContent='생성 '+(mode==='etf'?RAW.etf.generated:RAW.stk.generated)+' · '+(mode==='etf'?RAW.etf.method:RAW.stk.method);
  document.getElementById('when').innerHTML=s.ym.slice(0,4)+'.'+s.ym.slice(4)+'<small>'+s.date.slice(0,4)+'-'+s.date.slice(4,6)+'-'+s.date.slice(6)+' 기준</small>';
  document.getElementById('ticks').innerHTML=snaps.map((x,i)=>i%3===0||i===snaps.length-1?'<span>'+x.ym.slice(2,4)+'.'+x.ym.slice(4)+'</span>':'').join('');
  document.getElementById('content').innerHTML = mode==='etf'?renderETF(s,prev):renderSTK(s,prev);
  document.querySelectorAll('#modetabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.mode===mode));
  document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('on',t.dataset.m===mkt));
}
render();
</script></body></html>
