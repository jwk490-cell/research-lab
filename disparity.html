<h1>코스피 · 코스닥 50일 이격도</h1>
<div class="sub">지수가 50일 이동평균선에서 얼마나 벌어졌나 — '지금의 위치'를 파악하는 보조지표</div>
<div class="meta" id="meta"></div>
<div class="formula">📐 <b>50일 이격도 = 현재가 ÷ 50일 이동평균 × 100</b> · 메인 <b style="color:var(--gold)">50일</b>, 참고 <b style="color:var(--blue)">20일</b>(단기)·<b style="color:var(--purple)">120일</b>(장기).<br>
응용(이그전) · <span class="hot">130% 이상 → 과열권 진입</span>(Panic Buying 자제) · <span class="cool">110% 이하 → 과열 해소 진행</span>(Panic Selling 자제).
130/110은 딱 자르지 않고 상황에 맞춰 본다 — 강세장에선 '이격 조정'이 늘 반복된다.</div>

const COL={20:'#5a9bd8',50:'#e6b93f',120:'#a98fd6'};
const OVERHEAT=130, COOL=110, BASE=100;
const fmtDt=d=>`${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6)}`;
document.getElementById('meta').innerHTML =
  `기준일 <b>${fmtDt(D.base_dt)}</b> · 최근 <b>${D.window}</b>거래일(약 1년) · 갱신 ${D.fetched_at} · 출처 키움 ka20009`;

function status(cur){
  if(cur>=OVERHEAT) return ['과열권','b-hot'];
  if(cur<=COOL)     return ['과열해소','b-cool'];
  return ['중립','b-mid'];
}
function dispColor(v){return v>=OVERHEAT?'#e0606a':v<=COOL?'#5cbf8a':'#e6b93f';}

// ── 콤보 차트: 종가지수+50일선(좌축, 선) / 50일 이격도(우축, 막대) + 20·120 참고선 ──
function drawCombo(cv, m){
  const dpr=window.devicePixelRatio||1, W=cv.clientWidth, H=300, P={l:54,r:48,t:12,b:20};
  cv.width=W*dpr; cv.height=H*dpr; const x=cv.getContext('2d'); x.scale(dpr,dpr);
  const n=m.dates.length;
  const IW=W-P.l-P.r, IH=H-P.t-P.b;
  // 좌축: 지수 + 50일선
  let lL=Infinity, lH=-Infinity;
  [m.idx, m.ma['50']].forEach(s=>s.forEach(v=>{if(v!=null){lL=Math.min(lL,v);lH=Math.max(lH,v);}}));
  const lp=(lH-lL)*0.06; lL-=lp; lH+=lp;
  // 우축: 이격도 20/50/120 + 기준선
  let rL=Infinity, rH=-Infinity;
  [20,50,120].forEach(k=>m.disp[k].forEach(v=>{if(v!=null){rL=Math.min(rL,v);rH=Math.max(rH,v);}}));
  rL=Math.min(rL,COOL,BASE)-3; rH=Math.max(rH,OVERHEAT)+3;
  const px=i=>P.l+IW*i/(n-1);
  const pyL=v=>P.t+IH*(1-(v-lL)/(lH-lL||1));
  const pyR=v=>P.t+IH*(1-(v-rL)/(rH-rL||1));
  const bw=Math.max(1, IW/n*0.62);
  // 막대: 50일 이격도(우축) — 기준선 100 위/아래 색 구분
  m.disp['50'].forEach((v,i)=>{if(v==null)return;
    const X=px(i), y0=pyR(rL), y1=pyR(v);
    x.fillStyle = v>=OVERHEAT ? 'rgba(224,96,106,.55)' : v<=COOL ? 'rgba(92,191,138,.5)' : 'rgba(230,185,63,.62)';
    x.fillRect(X-bw/2, Math.min(y0,y1), bw, Math.abs(y1-y0));});
  // 우축 기준선(100/110/130)
  x.font='10px Pretendard,sans-serif';
  const rline=(v,col,dash,lbl)=>{x.strokeStyle=col; x.lineWidth=1; x.setLineDash(dash); x.beginPath();
    x.moveTo(P.l,pyR(v)); x.lineTo(W-P.r,pyR(v)); x.stroke(); x.setLineDash([]);
    x.fillStyle=col; x.textAlign='left'; x.fillText(lbl, W-P.r+3, pyR(v)+3);};
  rline(OVERHEAT,'rgba(224,96,106,.6)',[5,3],'130');
  rline(BASE,'#3a4150',[2,3],'100');
  rline(COOL,'rgba(92,191,138,.6)',[5,3],'110');
  // 참고 이격도선(20·120, 우축)
  const rlineSeries=(s,col)=>{x.strokeStyle=col; x.lineWidth=1; x.globalAlpha=.55; x.beginPath(); let st=false;
    s.forEach((v,i)=>{if(v==null)return;const X=px(i),Y=pyR(v);st?x.lineTo(X,Y):x.moveTo(X,Y);st=true;}); x.stroke(); x.globalAlpha=1;};
  rlineSeries(m.disp['20'], COL[20]); rlineSeries(m.disp['120'], COL[120]);
  // 좌축 선: 50일선(파랑) + 종가지수(흰색)
  const lLine=(s,col,w)=>{x.strokeStyle=col; x.lineWidth=w; x.beginPath(); let st=false;
    s.forEach((v,i)=>{if(v==null)return;const X=px(i),Y=pyL(v);st?x.lineTo(X,Y):x.moveTo(X,Y);st=true;}); x.stroke();};
  lLine(m.ma['50'], '#9fb2cc', 2.0); lLine(m.idx, '#f1f3f7', 1.7);
  // 좌축 눈금(지수)
  x.fillStyle='#69727f'; x.textAlign='right';
  for(let g=0;g<=3;g++){const v=lL+(lH-lL)*g/3; x.fillText(Math.round(v).toLocaleString(), P.l-5, pyL(v)+3);}
  // x축 날짜
  x.textAlign='center'; const step=Math.ceil(n/6);
  for(let i=0;i<n;i+=step){x.fillText(m.dates[i].slice(2,4)+'/'+m.dates[i].slice(4,6), px(i), H-5);}
  // 현재 50일 이격도 콜아웃
  const last=m.disp['50'][n-1];
  if(last!=null){const X=px(n-1),Y=pyR(last);
    x.fillStyle=dispColor(last); x.beginPath(); x.arc(X,Y,3,0,7); x.fill();
    const t=last.toFixed(1), tw=x.measureText(t).width+10;
    x.fillStyle=dispColor(last); roundRect(x, X-tw-6, Y-9, tw, 17, 4); x.fill();
    x.fillStyle='#15171c'; x.font='bold 11px Pretendard,sans-serif'; x.textAlign='center';
    x.fillText(t, X-6-tw/2, Y+3.5);}
}
function roundRect(x,X,Y,w,h,r){x.beginPath();x.moveTo(X+r,Y);x.arcTo(X+w,Y,X+w,Y+h,r);
  x.arcTo(X+w,Y+h,X,Y+h,r);x.arcTo(X,Y+h,X,Y,r);x.arcTo(X,Y,X+w,Y,r);x.closePath();}

Object.entries(D.markets).forEach(([key,m])=>{

      <span style="color:${COL[20]}"><i style="border-color:${COL[20]}"></i>20일 이격도(우)</span>
      <span style="color:${COL[120]}"><i style="border-color:${COL[120]}"></i>120일 이격도(우)</span>

      <span style="color:var(--green)"><i style="border-color:var(--green);border-top-style:dashed"></i>해소 110</span>
    </div>`;
  grid.appendChild(card);
  drawCombo(card.querySelector('.ccombo'), m);
});
